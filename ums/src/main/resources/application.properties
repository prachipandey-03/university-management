spring.application.name=ums
spring.config.import=optional:file:./local-db.properties
spring.datasource.url=${UMS_DB_URL:jdbc:mysql://localhost:3306/ums?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${UMS_DB_USERNAME:__SET_DB_USERNAME__}
spring.datasource.password=${UMS_DB_PASSWORD:__SET_DB_PASSWORD__}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Comma-separated patterns; use * for local dev (file:// + Live Server + localhost)
ums.cors.allowed-origin-patterns=*
ums.seed-demo-data=false
