<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniVerse — Authentication</title>
  <meta name="description" content="Authenticate to access the UniVerse University Management System." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

  <!-- Particle Canvas — UNSTABLE mode -->
  <canvas id="particleCanvas"></canvas>
  <div class="bg-overlay"></div>
  <div class="bg-light-rays"></div>

  <!-- Auth Container -->
  <div class="auth-container">
    <div class="auth-card">

      <!-- Logo — Agent 1: PNG Logo -->
      <div class="auth-header">
        <div class="auth-logo-mini">
          <img
            src="assets/ums-logo-new.png"
            alt="UniVerse UMS Logo"
            style="width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(124,110,247,0.9));border-radius:50%;"
          />
        </div>
        <h1 class="auth-title">System Access</h1>
        <p class="auth-subtitle">UniVerse Management Portal</p>
      </div>

      <!-- Form -->
      <form class="auth-form" id="authForm" onsubmit="handleAuth(event)" autocomplete="off">

        <!-- Error message -->
        <div class="auth-error" id="authError">
          ⚠ Invalid credentials. Try admin / admin123
        </div>

        <!-- User ID -->
        <div class="form-group">
          <label class="form-label" for="userId">User ID</label>
          <div class="form-input-wrap">
            <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              class="form-input"
              type="text"
              id="userId"
              name="userId"
              placeholder="Enter your User ID"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="form-input-wrap">
            <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="new-password"
              required
            />
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="auth-btn" id="authBtn">
          Authenticate
        </button>

      </form>

      <!-- Footer -->
      <div class="auth-footer">
        <p>Secured by UniVerse Portal v2.0<br/>Unauthorized access is strictly prohibited</p>
      </div>

    </div>
  </div>

  <!-- Particle status hint -->
  <p class="particle-hint">⚡ Secure Environment Active</p>

  <!-- Success overlay -->
  <div class="auth-success-overlay" id="authSuccessOverlay">
    <div class="auth-success-content">
      <div class="auth-success-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2>Access Granted</h2>
      <p>Welcome, Administrator. Loading your dashboard…</p>
    </div>
  </div>

  <script src="js/particles.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
